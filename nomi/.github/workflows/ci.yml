name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: ai-act-wizard/package-lock.json

      - name: Install dependencies
        working-directory: ai-act-wizard
        run: npm install

      - name: Lint
        working-directory: ai-act-wizard
        run: npm run lint

      - name: Type check
        working-directory: ai-act-wizard
        run: npm run type-check

      - name: Unit tests
        working-directory: ai-act-wizard
        run: npm run test
